<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeTree — LifeTree 知识土壤拓扑查看器</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0f19; color: #f8fafc; margin: 0; overflow: hidden; }
        #graph-container { width: 100vw; height: 100vh; background: radial-gradient(circle at 50% 50%, #1e293b 0%, #0b0f19 100%); }
        .glass-panel { background: rgba(17, 24, 39, 0.85); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(135deg, #34d399 0%, #10b981 50%, #059669 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="absolute top-4 left-4 right-4 z-10 flex flex-wrap items-center justify-between gap-4 p-4 rounded-2xl glass-panel shadow-2xl">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-emerald-500/20 border border-emerald-500/40 flex items-center justify-center text-xl">
                🕸️
            </div>
            <div>
                <h1 class="text-lg font-bold text-white tracking-tight">LifeTree <span class="gradient-text">知识图谱查看器</span></h1>
                <p class="text-xs text-slate-400">力导向图谱 · 实体检索 · 细节下钻</p>
            </div>
        </div>

        <div class="flex items-center gap-3">
            <input type="text" id="searchInput" oninput="searchNode(this.value)" placeholder="搜索节点..." class="px-4 py-2 bg-slate-900/80 border border-slate-700 text-white rounded-xl text-xs focus:outline-none focus:border-emerald-500 w-48" />
            <button onclick="resetGraph()" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 text-white font-semibold text-xs rounded-xl border border-slate-700">
                居中复位
            </button>
        </div>
    </div>

    <!-- Canvas -->
    <div id="graph-container"></div>

    <!-- Inspector -->
    <div id="inspector" class="absolute top-24 right-4 w-80 z-10 glass-panel rounded-2xl p-5 shadow-2xl hidden border border-slate-700/60">
        <div class="flex items-center justify-between border-b border-slate-800 pb-2 mb-3">
            <h3 class="text-sm font-bold text-white flex items-center gap-2">
                <span>🔍 节点属性详情</span>
            </h3>
            <button onclick="closeInspector()" class="text-slate-400 hover:text-white">&times;</button>
        </div>
        <div id="inspector-body" class="text-xs space-y-2"></div>
    </div>

    <script>
        const nodesData = [{"id": "usr_person", "label": "申请人 (Person)", "group": "PERSON", "color": "#10b981", "shape": "dot", "size": 18, "raw_data": {"id": "usr_person", "label": "申请人 (Person)", "entity_type": "PERSON", "confidence": 1.0}}, {"id": "asset_sperrkonto", "label": "€12,000 保证金账户", "group": "CAPITAL_ASSET", "color": "#f59e0b", "shape": "dot", "size": 18, "raw_data": {"id": "asset_sperrkonto", "label": "€12,000 保证金账户", "entity_type": "CAPITAL_ASSET", "confidence": 1.0, "properties": {"amount": 12000, "currency": "EUR"}}}, {"id": "reg_chancenkarte", "label": "德国机会卡法规 § 20a", "group": "REGULATION_LAW", "color": "#6366f1", "shape": "dot", "size": 18, "raw_data": {"id": "reg_chancenkarte", "label": "德国机会卡法规 § 20a", "entity_type": "REGULATION_LAW", "confidence": 0.9}}, {"id": "inst_embassy", "label": "德国大使馆签证处", "group": "INSTITUTION_AGENCY", "color": "#8b5cf6", "shape": "dot", "size": 18, "raw_data": {"id": "inst_embassy", "label": "德国大使馆签证处", "entity_type": "INSTITUTION_AGENCY", "confidence": 0.95}}, {"id": "route_bluecard", "label": "欧盟蓝卡工作签证 § 18g", "group": "PATHWAY_ROUTE", "color": "#ec4899", "shape": "dot", "size": 18, "raw_data": {"id": "route_bluecard", "label": "欧盟蓝卡工作签证 § 18g", "entity_type": "PATHWAY_ROUTE", "confidence": 1.0}}];
        const edgesData = [{"from": "usr_person", "to": "asset_sperrkonto", "label": "REQUIRES_CAPITAL", "font": {"color": "#94a3b8", "size": 10}, "color": {"color": "rgba(255, 255, 255, 0.15)", "highlight": "#34d399"}, "arrows": {"to": {"enabled": true, "scaleFactor": 0.6}}}, {"from": "asset_sperrkonto", "to": "reg_chancenkarte", "label": "GOVERNS", "font": {"color": "#94a3b8", "size": 10}, "color": {"color": "rgba(255, 255, 255, 0.15)", "highlight": "#34d399"}, "arrows": {"to": {"enabled": true, "scaleFactor": 0.6}}}, {"from": "reg_chancenkarte", "to": "inst_embassy", "label": "DEPENDS_ON", "font": {"color": "#94a3b8", "size": 10}, "color": {"color": "rgba(255, 255, 255, 0.15)", "highlight": "#34d399"}, "arrows": {"to": {"enabled": true, "scaleFactor": 0.6}}}, {"from": "inst_embassy", "to": "route_bluecard", "label": "CONVERTS_TO", "font": {"color": "#94a3b8", "size": 10}, "color": {"color": "rgba(255, 255, 255, 0.15)", "highlight": "#34d399"}, "arrows": {"to": {"enabled": true, "scaleFactor": 0.6}}}];

        const visNodes = new vis.DataSet(nodesData);
        const visEdges = new vis.DataSet(edgesData);

        const container = document.getElementById('graph-container');
        const data = { nodes: visNodes, edges: visEdges };

        const options = {
            nodes: {
                font: { color: '#f8fafc', size: 12, face: 'Inter, system-ui, sans-serif' },
                borderWidth: 2,
                shadow: true
            },
            physics: {
                barnesHut: { gravitationalConstant: -3000, springLength: 120 }
            }
        };

        const network = new vis.Network(container, data, options);

        network.on("click", function(params) {
            if (params.nodes.length > 0) {
                const nid = params.nodes[0];
                const nodeItem = nodesData.find(n => n.id === nid);
                if (nodeItem) openInspector(nodeItem);
            } else {
                closeInspector();
            }
        });

        function openInspector(nodeItem) {
            const panel = document.getElementById('inspector');
            const body = document.getElementById('inspector-body');

            const isZh = true;
            const n = nodeItem.raw_data || {};

            body.innerHTML = `
                <div class="p-3 bg-slate-900/80 rounded-xl border border-slate-800 space-y-2">
                    <div class="font-bold text-emerald-400 text-sm">${nodeItem.label}</div>
                    <div class="text-slate-400">ID: <span class="text-slate-200 font-mono">${nodeItem.id}</span></div>
                    <div class="text-slate-400">${isZh ? '实体类型' : 'Type'}: <span class="px-2 py-0.5 rounded bg-emerald-500/20 text-emerald-300 font-bold">${nodeItem.group}</span></div>
                    <div class="text-slate-400">${isZh ? '可信度' : 'Confidence'}: <span class="text-white font-mono">${n.confidence || 1.0}</span></div>
                </div>
            `;
            panel.classList.remove('hidden');
        }

        function closeInspector() {
            document.getElementById('inspector').classList.add('hidden');
        }

        function searchNode(val) {
            if (!val.trim()) return;
            const match = nodesData.find(n => n.label.toLowerCase().includes(val.toLowerCase()));
            if (match) {
                network.focus(match.id, { scale: 1.2, animation: { duration: 500 } });
                network.selectNodes([match.id]);
                openInspector(match);
            }
        }

        function resetGraph() {
            network.fit({ animation: { duration: 600 } });
        }
    </script>
</body>
</html>
