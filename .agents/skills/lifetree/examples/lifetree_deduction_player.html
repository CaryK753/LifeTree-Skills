<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>时序推演 - LifeTree</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        gray: {
                            950: '#0c0c14',
                            900: '#16161f',
                            800: '#1e1e2a',
                            700: '#2a2a3a',
                            400: '#8888a0',
                            100: '#e8e8ee',
                        },
                        primary: '#6366f1',
                        success: '#22c55e',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0c0c14;
            color: #e8e8ee;
        }
        .card {
            background-color: #16161f;
            border: 1px solid #2a2a3a;
            border-radius: 12px;
            transition: background-color 0.2s;
        }
        .card:hover {
            background-color: #1e1e2a;
        }
        /* Custom Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            margin-top: -6px;
            border: 2px solid #0c0c14;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #2a2a3a;
            border-radius: 2px;
        }
        input[type=range]:focus {
            outline: none;
        }
        
        #notification {
            transition: transform 0.3s ease-in-out, opacity 0.3s ease-in-out;
            transform: translateY(-100%);
            opacity: 0;
        }
        #notification.show {
            transform: translateY(0);
            opacity: 1;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-8 px-4 sm:px-6 lg:px-8">
    
    <!-- Notification Toast -->
    <div id="notification" class="fixed top-4 right-4 z-50 flex items-center p-4 card border-danger/50 bg-danger/10 text-danger">
        <svg class="w-5 h-5 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
        <div>
            <h4 class="font-medium text-sm">风险冲击注入成功</h4>
            <p class="text-xs text-danger/80 mt-1">净资产与信心指数已受影响</p>
        </div>
    </div>

    <div class="w-full max-w-6xl space-y-6">
        <!-- Header -->
        <header class="flex items-center justify-between card p-6">
            <div class="flex items-center space-x-4">
                <div class="w-10 h-10 rounded bg-primary/20 flex items-center justify-center text-primary font-bold text-xl border border-primary/30">
                    LT
                </div>
                <div>
                    <h1 class="text-xl font-semibold">时序推演模拟器</h1>
                    <p class="text-sm text-gray-400 mt-1">探索五年期发展轨迹</p>
                </div>
            </div>
            <div class="flex items-center space-x-3">
                <a href="/" class="text-sm text-gray-400 hover:text-gray-100 transition px-3 py-2">返回主页</a>
                <button id="shockBtn" class="flex items-center px-4 py-2 bg-danger/10 text-danger border border-danger/30 rounded-lg hover:bg-danger/20 transition text-sm font-medium">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    风险冲击测试
                </button>
            </div>
        </header>

        <!-- Player Controls -->
        <div class="card p-6">
            <div class="flex items-center space-x-6">
                <button id="playBtn" class="w-12 h-12 rounded-full bg-primary flex items-center justify-center text-white hover:bg-primary/90 transition flex-shrink-0">
                    <svg id="playIcon" class="w-6 h-6 ml-1" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pauseIcon" class="w-6 h-6 hidden" fill="currentColor" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <div class="flex-1">
                    <div class="flex justify-between text-xs text-gray-400 mb-2 font-medium" id="timelineLabels">
                        <!-- Year labels injected here -->
                    </div>
                    <input type="range" id="timelineSlider" min="0" max="0" value="0" step="1">
                </div>
                <div class="w-16 text-right">
                    <span id="currentYearDisplay" class="text-lg font-semibold text-primary"></span>
                </div>
            </div>
        </div>

        <!-- Charts Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Capital Chart -->
            <div class="card p-6">
                <h3 class="text-sm font-medium text-gray-400 mb-4">资产增长曲线 (USD)</h3>
                <div class="h-64">
                    <canvas id="capitalChart"></canvas>
                </div>
            </div>
            
            <!-- Confidence Chart -->
            <div class="card p-6">
                <h3 class="text-sm font-medium text-gray-400 mb-4">信心指数趋势 (0.0 - 1.0)</h3>
                <div class="h-64">
                    <canvas id="confidenceChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Current Year Details -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="yearDetails">
            <div class="card p-6">
                <div class="text-sm text-gray-400 mb-1">净资产估算</div>
                <div class="text-3xl font-semibold text-success flex items-baseline">
                    $<span id="detailNetWorth">0</span>
                </div>
            </div>
            <div class="card p-6">
                <div class="text-sm text-gray-400 mb-1">信心指数</div>
                <div class="text-3xl font-semibold text-primary">
                    <span id="detailConfidence">0.00</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const sourceData = {"deduction_summary": {"timeline_horizon_years": 5, "final_year_prob_pathway_a": 0.98, "final_year_prob_pathway_b": 0.8, "recommended_branch": "Pathway A (Chancenkarte -> Blue Card)"}, "pathway_a_trajectory": [{"year": 1, "success_probability": 0.85, "capital_balance_usd": 26000.0, "events": ["Year 1 Standard Progression"], "plan_b_active": false, "badge": "OPTIMAL_PROGRESSION"}, {"year": 2, "success_probability": 0.9, "capital_balance_usd": 46000.0, "events": ["Year 2 Standard Progression"], "plan_b_active": false, "badge": "OPTIMAL_PROGRESSION"}, {"year": 3, "success_probability": 0.98, "capital_balance_usd": 76000.0, "events": ["Year 3 Standard Progression", "Statutory Settlement PR (§ 18g) Unlocked!"], "plan_b_active": false, "badge": "PR_ELIGIBLE"}, {"year": 4, "success_probability": 0.98, "capital_balance_usd": 76000.0, "events": ["Year 4 Standard Progression"], "plan_b_active": false, "badge": "PR_ELIGIBLE"}, {"year": 5, "success_probability": 0.98, "capital_balance_usd": 76000.0, "events": ["Year 5 Standard Progression"], "plan_b_active": false, "badge": "PR_ELIGIBLE"}], "pathway_b_trajectory": [{"year": 1, "success_probability": 0.7, "capital_balance_usd": 35000.0, "events": ["Year 1 Direct Employment Progression"], "plan_b_active": false, "badge": "HIGH_FRICTION_PROGRESSION"}, {"year": 2, "success_probability": 0.7, "capital_balance_usd": 60000.0, "events": ["Year 2 Direct Employment Progression"], "plan_b_active": false, "badge": "HIGH_FRICTION_PROGRESSION"}, {"year": 3, "success_probability": 0.8, "capital_balance_usd": 95000.0, "events": ["Year 3 Direct Employment Progression"], "plan_b_active": false, "badge": "HIGH_FRICTION_PROGRESSION"}, {"year": 4, "success_probability": 0.8, "capital_balance_usd": 95000.0, "events": ["Year 4 Direct Employment Progression"], "plan_b_active": false, "badge": "HIGH_FRICTION_PROGRESSION"}, {"year": 5, "success_probability": 0.8, "capital_balance_usd": 95000.0, "events": ["Year 5 Direct Employment Progression"], "plan_b_active": false, "badge": "HIGH_FRICTION_PROGRESSION"}]};
        
        // State
        let projection = JSON.parse(JSON.stringify(sourceData.timeline_projection)); // deep copy
        let currentIndex = 0;
        let isPlaying = false;
        let playInterval = null;
        let maxIndex = projection.length - 1;
        
        // Chart instances
        let capitalChart = null;
        let confidenceChart = null;
        
        // DOM Elements
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const timelineSlider = document.getElementById('timelineSlider');
        const timelineLabels = document.getElementById('timelineLabels');
        const currentYearDisplay = document.getElementById('currentYearDisplay');
        const detailNetWorth = document.getElementById('detailNetWorth');
        const detailConfidence = document.getElementById('detailConfidence');
        const shockBtn = document.getElementById('shockBtn');
        const notification = document.getElementById('notification');
        
        // Common Chart.js options for SaaS look
        Chart.defaults.color = '#8888a0';
        Chart.defaults.font.family = 'Inter';
        
        const commonOptions = {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    backgroundColor: '#16161f',
                    titleColor: '#e8e8ee',
                    bodyColor: '#e8e8ee',
                    borderColor: '#2a2a3a',
                    borderWidth: 1,
                    padding: 10,
                    displayColors: false,
                    callbacks: {
                        title: (context) => context[0].label + ' 年'
                    }
                }
            },
            scales: {
                x: {
                    grid: { color: '#2a2a3a', drawBorder: false },
                    ticks: { color: '#8888a0' }
                },
                y: {
                    grid: { color: '#2a2a3a', drawBorder: false },
                    ticks: { color: '#8888a0' }
                }
            },
            interaction: {
                intersect: false,
                mode: 'index',
            }
        };

        function formatCurrency(value) {
            return value.toLocaleString('en-US', { maximumFractionDigits: 0 });
        }

        function initCharts() {
            const labels = projection.map(d => d.year);
            const netWorthData = projection.map(d => d.net_worth_usd);
            const confidenceData = projection.map(d => d.confidence_score);
            
            const capCtx = document.getElementById('capitalChart').getContext('2d');
            capitalChart = new Chart(capCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '净资产',
                        data: netWorthData,
                        borderColor: '#22c55e',
                        backgroundColor: 'rgba(34, 197, 94, 0.1)',
                        borderWidth: 2,
                        pointRadius: 4,
                        pointBackgroundColor: '#16161f',
                        pointBorderColor: '#22c55e',
                        pointBorderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    ...commonOptions,
                    scales: {
                        ...commonOptions.scales,
                        y: {
                            ...commonOptions.scales.y,
                            ticks: {
                                callback: function(value) {
                                    if(value >= 1000) return '$' + (value/1000) + 'k';
                                    return '$' + value;
                                }
                            }
                        }
                    }
                }
            });

            const confCtx = document.getElementById('confidenceChart').getContext('2d');
            confidenceChart = new Chart(confCtx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '信心指数',
                        data: confidenceData,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        borderWidth: 2,
                        pointRadius: 4,
                        pointBackgroundColor: '#16161f',
                        pointBorderColor: '#6366f1',
                        pointBorderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    ...commonOptions,
                    scales: {
                        ...commonOptions.scales,
                        y: {
                            ...commonOptions.scales.y,
                            min: 0,
                            max: 1.0,
                            ticks: { stepSize: 0.2 }
                        }
                    }
                }
            });
        }

        function updateCharts() {
            // Highlight up to current index
            const netWorthData = projection.map(d => d.net_worth_usd);
            const confidenceData = projection.map(d => d.confidence_score);
            
            capitalChart.data.datasets[0].data = netWorthData;
            confidenceChart.data.datasets[0].data = confidenceData;
            
            // Highlight the current point
            const pointRadius = projection.map((_, i) => i === currentIndex ? 6 : 4);
            const pointBorderWidth = projection.map((_, i) => i === currentIndex ? 3 : 2);
            
            capitalChart.data.datasets[0].pointRadius = pointRadius;
            capitalChart.data.datasets[0].pointBorderWidth = pointBorderWidth;
            
            confidenceChart.data.datasets[0].pointRadius = pointRadius;
            confidenceChart.data.datasets[0].pointBorderWidth = pointBorderWidth;

            capitalChart.update();
            confidenceChart.update();
        }

        function updateUI() {
            const currentData = projection[currentIndex];
            currentYearDisplay.textContent = currentData.year;
            detailNetWorth.textContent = formatCurrency(currentData.net_worth_usd);
            detailConfidence.textContent = currentData.confidence_score.toFixed(2);
            timelineSlider.value = currentIndex;
            updateCharts();
        }

        function initUI() {
            timelineSlider.max = maxIndex;
            
            // Init labels
            timelineLabels.innerHTML = '';
            projection.forEach(d => {
                const span = document.createElement('span');
                span.textContent = d.year;
                timelineLabels.appendChild(span);
            });
            
            initCharts();
            updateUI();
        }

        // Controls
        function togglePlay() {
            if (isPlaying) {
                pause();
            } else {
                if (currentIndex === maxIndex) currentIndex = 0;
                play();
            }
        }

        function play() {
            isPlaying = true;
            playIcon.classList.add('hidden');
            pauseIcon.classList.remove('hidden');
            
            playInterval = setInterval(() => {
                if (currentIndex < maxIndex) {
                    currentIndex++;
                    updateUI();
                } else {
                    pause();
                }
            }, 1500); // 1.5s per year
        }

        function pause() {
            isPlaying = false;
            playIcon.classList.remove('hidden');
            pauseIcon.classList.add('hidden');
            if (playInterval) clearInterval(playInterval);
        }

        // Event Listeners
        playBtn.addEventListener('click', togglePlay);
        
        timelineSlider.addEventListener('input', (e) => {
            currentIndex = parseInt(e.target.value);
            if (isPlaying) pause();
            updateUI();
        });

        shockBtn.addEventListener('click', () => {
            // Apply shock starting from current index
            for (let i = currentIndex; i <= maxIndex; i++) {
                projection[i].net_worth_usd = Math.max(0, projection[i].net_worth_usd * 0.85);
                projection[i].confidence_score = Math.max(0, projection[i].confidence_score * 0.85);
            }
            updateUI();
            
            // Show notification
            notification.classList.add('show');
            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        });

        // Initialize
        initUI();
    </script>
</body>
</html>
